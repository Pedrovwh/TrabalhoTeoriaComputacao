<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Tradutor Monolítico para Recursivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container fixed-center">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: solid 2px; margin-bottom: 10px;">
            <h1>Tradutor Monolítico ➜ Recursivo</h1>
        
            <a role="button" class="btn btn-outline-success" href="../index.html">Voltar</a>
        </div>
        <div class="section">
            <h2>Definições</h2>

            <div class="config-inicial">
                Programa Principal (P) começa em: <strong>R</strong>
                <input type="number" id="inputInicio" value="1">
            </div>

            <div id="containerLinhas">
            </div>

            <div class="btn-group" role="group" aria-label="Basic Exemple">
                <button class="btn btn-outline-secondary" onclick="addLinha('op')">+ Adicionar Operação</button>
                <button class="btn btn-outline-secondary" onclick="addLinha('teste')">+ Adicionar Teste</button>
            </div>

            <button class="btn-gerar" onclick="gerarTraduçao()">GERAR TRADUÇÃO RECURSIVA</button>
        </div>

        <div class="secao">
            <h2>Código Traduzido</h2>
            <pre id="output">O resultado aparecerá aqui...</pre>
        </div>
    </div>


</body>
<script src="script.js"></script>

</html>
