<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Tradutor Iterativo para Recursivo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container fixed-center">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:solid 2px; margin-bottom:10px;">
            <h1>Tradutor Iterativo ➜ Recursivo</h1>
            <a role="button" class="btn btn-outline-success" href="../iterativoEscolha.html">Voltar</a>
        </div>

        <div class="section">
        <h2>Programa Iterativo (montagem)</h2>

        <div class="mb-2 text-muted">
            Vai adicionando blocos: Operação, Se, Enquanto, Até. Pode aninhar o quanto quiser.
        </div>

        <div id="programRoot" class="mb-3"></div>

        <div class="btn-group" role="group" aria-label="add-root">
            <button class="btn btn-outline-secondary" onclick="adicionarInstrucao(document.getElementById('programRoot'))">
            + Adicionar instrução
            </button>
        </div>

        <br><br>
        <button class="btn-gerar" onclick="gerarTraducaoIterRec()">GERAR TRADUÇÃO RECURSIVA</button>
        </div>

        <div class="secao">
        <h2>Código Traduzido</h2>
        <pre id="output">O resultado aparecerá aqui...</pre>
        </div>
        </div>

    <script src="scriptIterRec.js"></script>
    </body>
</html>
